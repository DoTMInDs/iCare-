{% load static tailwind_tags pwa %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RoBosForx - {% block title %}{% endblock %}</title>

    <!-- Favicon - Your RoboForex Logo from correct path -->
    <link rel="icon" type="image/png" sizes="72x72" href="{% static 'imgs/icons/icon-72x72.png' %}">
    <link rel="icon" type="image/png" sizes="96x96" href="{% static 'imgs/icons/icon-96x96.png' %}">
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'imgs/icons/icon-192x192.png' %}">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="152x152" href="{% static 'imgs/icons/icon-152x152.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'imgs/icons/icon-180x180.png' %}">
    
    <!-- PWA Manifest -->
    {% progressive_web_app_meta %}

    {% tailwind_css %}
    <script src="https://kit.fontawesome.com/1566b08547.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <style>
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .pwa-install-animate {
            animation: slideUp 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-gray-50" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    
    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        {% block footer %}{% endblock %}
    </footer>

    <!-- PWA Service Worker Registration and Install Prompt -->
    <script>
        let deferredPrompt;
        let installButton = null;

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/serviceworker.js').then(function(registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }).catch(function(err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }

        // Create install button with YOUR generated RoboForex logo from correct path
        function createInstallButton() {
            if (installButton) return;
            
            installButton = document.createElement('div');
            installButton.id = 'pwa-install-banner';
            installButton.className = 'pwa-install-animate';
            installButton.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 20px;
                right: 20px;
                z-index: 9999;
                background: linear-gradient(135deg, #1e293b, #0f172a);
                backdrop-filter: blur(10px);
                border-radius: 16px;
                box-shadow: 0 8px 32px rgba(0,0,0,0.2);
                max-width: 400px;
                margin: 0 auto;
                font-family: system-ui, -apple-system, sans-serif;
                border: 1px solid rgba(255,255,255,0.1);
            `;
            
            installButton.innerHTML = `
                <div style="padding: 16px;">
                    <div style="display: flex; align-items: start; gap: 12px; margin-bottom: 12px;">
                        <img src="/static/imgs/icons/icon-72x72.png" alt="RoBosForx" style="width: 48px; height: 48px; border-radius: 12px; object-fit: contain;">
                        <div style="flex: 1;">
                            <div style="font-weight: 700; font-size: 16px; color: white; margin-bottom: 4px;">Install RoBosForx App</div>
                            <div style="font-size: 13px; color: #94a3b8;">Get faster access, offline support, and a better trading experience</div>
                        </div>
                        <button onclick="dismissInstallPrompt()" style="background: none; border: none; color: #94a3b8; cursor: pointer; padding: 4px; font-size: 20px; line-height: 1;">×</button>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="installPWA()" style="flex: 1; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; padding: 10px 16px; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px;">
                            Install Now
                        </button>
                        <button onclick="dismissInstallPrompt()" style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-size: 14px;">
                            Later
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(installButton);
        }

        // Handle beforeinstallprompt event
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            const dismissed = localStorage.getItem('pwa-install-dismissed');
            const dismissedTime = dismissed ? parseInt(dismissed) : 0;
            const thirtyDaysAgo = Date.now() - (30 * 24 * 60 * 60 * 1000);
            const isInstalled = window.matchMedia('(display-mode: standalone)').matches;
            
            if (!isInstalled && dismissedTime < thirtyDaysAgo) {
                setTimeout(createInstallButton, 3000);
            }
        });

        // Install PWA function
        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    }
                    deferredPrompt = null;
                    dismissInstallPrompt();
                });
            }
        }

        // Dismiss install prompt
        function dismissInstallPrompt() {
            const banner = document.getElementById('pwa-install-banner');
            if (banner) {
                banner.remove();
                installButton = null;
                localStorage.setItem('pwa-install-dismissed', Date.now().toString());
            }
        }

        // Handle app installed event
        window.addEventListener('appinstalled', (evt) => {
            console.log('RoBosForx PWA was installed');
            dismissInstallPrompt();
        });

        // Check if app is already installed
        if (window.matchMedia('(display-mode: standalone)').matches) {
            console.log('App is running in standalone mode');
            document.body.classList.add('pwa-installed');
        }
    </script>
</body>
</html>
