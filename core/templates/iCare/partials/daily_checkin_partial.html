{% load humanize %}
<div class="flex items-center gap-3 mb-4">
    <div class="w-10 h-10 bg-gradient-to-br from-yellow-500 to-orange-500 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
    </div>
    <div>
        <h3 class="font-semibold text-gray-900">Daily Check-in Bonus</h3>
        <p class="text-xs text-gray-500">Check in daily to earn rewards</p>
    </div>
</div>

<div class="flex justify-between items-center">
    <div>
        <p class="text-sm text-gray-600">Current Streak:</p>
        <p class="text-2xl font-bold text-orange-600">{{ checkin_streak }} days</p>
    </div>
    <div class="text-right">
        <p class="text-sm text-gray-600">Today's Bonus:</p>
        <p class="text-xl font-bold text-green-600">₵{{ daily_bonus|floatformat:2|intcomma }}</p>
    </div>
</div>

{% if not checked_in_today %}
<button hx-post="{% url 'daily_checkin' %}" hx-target="#checkin-container" hx-swap="innerHTML" class="w-full mt-4 py-3 bg-gradient-to-r from-yellow-500 to-orange-500 text-white rounded-xl font-medium hover:from-yellow-600 hover:to-orange-600 transition shadow-md">
    Check In Now
</button>
{% else %}
<div class="w-full mt-4 py-3 bg-green-100 text-green-600 rounded-xl font-medium text-center">
    ✅ Already checked in today!
</div>
{% endif %}
