<!-- Active State Example (JavaScript to highlight current page) -->
<script>
    function updateNavActiveState() {
        const currentPath = window.location.pathname;
        const navItems = [
            { element: document.querySelector('a[href*="home"]'), path: '/home', activeColor: 'text-blue-600', bgColor: 'bg-blue-200' },
            { element: document.querySelector('a[href*="product"]'), path: '/product', activeColor: 'text-purple-600', bgColor: 'bg-purple-200' },
            { element: document.querySelector('a[href*="team"]'), path: '/team', activeColor: 'text-green-600', bgColor: 'bg-green-200' },
            { element: document.querySelector('a[href*="profile"]'), path: '/profile', activeColor: 'text-orange-600', bgColor: 'bg-orange-200' }
        ];
        
        navItems.forEach(item => {
            if (item.element) {
                const icon = item.element.querySelector('svg');
                const text = item.element.querySelector('span');
                const div = item.element.querySelector('div');
                
                if (currentPath.includes(item.path)) {
                    if (icon) icon.classList.add(item.activeColor);
                    if (text) text.classList.add(item.activeColor);
                    if (div) div.classList.add(item.bgColor);
                } else {
                    if (icon) icon.classList.remove(item.activeColor);
                    if (text) text.classList.remove(item.activeColor);
                    if (div) div.classList.remove(item.bgColor);
                }
            }
        });
    }
    
    updateNavActiveState();
    document.body.addEventListener('htmx:afterSwap', updateNavActiveState);
</script>

<style>
    /* Add padding to bottom of your main content to prevent overlap */
    main {
        padding-bottom: 70px;
    }
    
    @media (min-width: 768px) {
        main {
            padding-bottom: 0;
        }
    }
    
    /* Smooth transitions */
    .fixed footer a {
        transition: all 0.2s ease;
    }
    
    /* Active tap effect for mobile */
    .fixed footer a:active {
        transform: scale(0.95);
    }
</style>
