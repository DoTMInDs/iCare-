{% extends "iCare/base.html" %}
{% load static %}
{% block content %}
{% include "iCare/partials/nav.html" %}
    <section class="bg-slate-100 p-2 rounded-md mx-w-4xl mb-[20px]">
        <div class="relative w-full overflow-hidden">
            <div class="">
                <img src="{% static "imgs/home-banner-DBi9Nn6u.jpg" %}" alt="">
            </div>
            <div class="absolute inset-y-0 right-0 flex items-center justify-center max-w-[55%] p-4">
                <div class="flex flex-col items-center justify-center">
                    <h1 class="text-2xl text-black/80 font-bold">Apple</h1>
                    <p class="text-gray-700 mt-2">Shareholder Store</p>
                    <a href="" class="text-blue-500 hover:text-blue-700 underline">
                        <button class="bg-black/90 hover:bg-black/70 text-white font-bold py-2 px-4 rounded-full mt-2">
                            Shop Now
                        </button>
                    </a>
                </div>
            </div>
        </div>
        <div class="flex gap-2 mt-2">
            <div class="w-1/2 h-[180px] rounded-2xl overflow-hidden relative shadow-lg bg-slate-900">
                <img src="{% static "imgs/recharge.jpg" %}" alt="Recharge" class="absolute inset-0 w-full h-full object-cover" />
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/60 to-black/20"></div>
                <div class="absolute inset-0 flex flex-col items-center justify-center px-4 text-center gap-2">
                    <p class="text-white text-xl font-bold">Recharge</p>
                    <a href="{% url "recharge" %}" class="inline-flex items-center justify-center rounded-full bg-black/90 px-5 py-2 text-sm font-semibold text-white shadow-lg shadow-blue-500/25 hover:bg-black/60 transition">
                        GO &gt;
                    </a>
                </div>
            </div>
            <div class="w-1/2 h-[180px] rounded-2xl overflow-hidden relative shadow-lg bg-slate-900">
                <img src="{% static "imgs/withdrawal.jpg" %}" alt="Withdraw" class="absolute inset-0 w-full h-full object-cover" />
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-black/0"></div>
                <div class="absolute inset-0 flex flex-col items-center justify-center px-4 text-center gap-2">
                    <p class="text-white text-xl font-bold">Withdraw</p>
                    <a href="{% url "withdraw" %}" class="inline-flex items-center justify-center rounded-full bg-black/90 px-5 py-2 text-sm font-semibold text-white shadow-lg shadow-blue-500/25 hover:bg-black/60 transition">
                        GO &gt;
                    </a>
                </div>
            </div>
        </div>
        <div class="flex gap-2 mt-2">
            <div class="w-1/2 h-[180px] rounded-2xl overflow-hidden relative shadow-lg bg-slate-900">
                <img src="{% static "imgs/task.jpg" %}" alt="Recharge" class="absolute inset-0 w-full h-full object-cover" />
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/60 to-black/20"></div>
                <div class="absolute inset-0 flex flex-col items-center justify-center px-4 text-center gap-2">
                    <p class="text-white text-xl font-bold">Task Center</p>
                    <a href="{% url "tasks" %}" class="inline-flex items-center justify-center rounded-full bg-black/90 px-5 py-2 text-sm font-semibold text-white shadow-lg shadow-blue-500/25 hover:bg-black/60 transition">
                        GO &gt;
                    </a>
                </div>
            </div>
            <div class="w-1/2 h-[180px] rounded-2xl overflow-hidden relative shadow-lg bg-slate-900">
                <img src="{% static "imgs/check-in.jpg" %}" alt="Check-In" class="absolute inset-0 w-full h-full object-cover" />
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-black/0"></div>
                <div class="absolute inset-0 flex flex-col items-center justify-center px-4 text-center gap-2">
                    <p class="text-white text-xl font-bold">Check-In</p>
                    <a href="{% url "check_in" %}" class="inline-flex items-center justify-center rounded-full bg-black/90 px-5 py-2 text-sm font-semibold text-white shadow-lg shadow-blue-500/25 hover:bg-black/60 transition">
                        GO &gt;
                    </a>
                </div>
            </div>
        </div>
    </section>

    {% include "iCare/partials/footer.html" %}
{% endblock  %}
