{% load static %}
{% if request.user.is_authenticated %}
<div id="webpush-container" class="w-full">
    <div class="flex items-center justify-between p-4 bg-white rounded-xl border border-gray-200">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center shadow-sm">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                </svg>
            </div>
            <div>
                <h3 class="font-semibold text-gray-900">Push Notifications</h3>
                <p class="text-sm text-gray-500">Receive real-time alerts on your device</p>
            </div>
        </div>
        
        <!-- Radio Toggle Switch -->
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="push-notification-toggle" class="sr-only peer">
            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
        </label>
    </div>
    
    <!-- Loading State -->
    <div id="notification-loading" class="hidden mt-2 text-center">
        <div class="inline-flex items-center gap-2 text-sm text-gray-500">
            <svg class="animate-spin h-4 w-4 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Updating notification settings...</span>
        </div>
    </div>
    
    <!-- Status Message -->
    <div id="notification-status" class="hidden mt-2 text-sm text-center"></div>
</div>

<style>
    .peer:checked ~ .peer-checked\:bg-blue-600 {
        background-color: #2563eb;
    }
    
    #push-notification-toggle:disabled + div {
        opacity: 0.5;
        cursor: not-allowed;
    }
</style>

<script>
    const vapidPublicKey = '{{ vapid_public_key }}';
    const toggle = document.getElementById('push-notification-toggle');
    const loadingDiv = document.getElementById('notification-loading');
    const statusDiv = document.getElementById('notification-status');
    
    // Convert base64 to Uint8Array for the applicationServerKey
    function urlBase64ToUint8Array(base64String) {
        const padding = '='.repeat((4 - base64String.length % 4) % 4);
        const base64 = (base64String + padding)
            .replace(/\-/g, '+')
            .replace(/_/g, '/');
        
        const rawData = window.atob(base64);
        const outputArray = new Uint8Array(rawData.length);
        
        for (let i = 0; i < rawData.length; ++i) {
            outputArray[i] = rawData.charCodeAt(i);
        }
        return outputArray;
    }
    
    // Get CSRF token for Django
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    // Show status message
    function showStatus(message, isError = false) {
        statusDiv.textContent = message;
        statusDiv.className = `mt-2 text-sm text-center ${isError ? 'text-red-600' : 'text-green-600'}`;
        statusDiv.classList.remove('hidden');
        
        setTimeout(() => {
            statusDiv.classList.add('hidden');
        }, 3000);
    }
    
    // Set loading state
    function setLoading(isLoading) {
        if (isLoading) {
            toggle.disabled = true;
            loadingDiv.classList.remove('hidden');
        } else {
            toggle.disabled = false;
            loadingDiv.classList.add('hidden');
        }
    }
    
    // Check if browser supports notifications
    if (!('serviceWorker' in navigator && 'PushManager' in window)) {
        toggle.disabled = true;
        showStatus('Push notifications are not supported in your browser', true);
        console.log('Push notifications not supported');
    } else {
        // Check current subscription status
        async function checkSubscription() {
            try {
                const registration = await navigator.serviceWorker.ready;
                const subscription = await registration.pushManager.getSubscription();
                
                if (subscription) {
                    toggle.checked = true;
                } else {
                    toggle.checked = false;
                }
            } catch (error) {
                console.error('Error checking subscription:', error);
                toggle.disabled = true;
            }
        }
        
        // Subscribe to push notifications
        async function subscribeToPush() {
            try {
                // Request permission first
                const permission = await Notification.requestPermission();
                
                if (permission !== 'granted') {
                    showStatus('Please allow notifications to receive updates', true);
                    return false;
                }
                
                const registration = await navigator.serviceWorker.ready;
                
                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(vapidPublicKey)
                });
                
                // Send subscription to server
                const response = await fetch('/webpush/save_information', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({
                        status_type: 'subscribe',
                        subscription: subscription.toJSON(),
                        browser: navigator.userAgent,
                        user_agent: navigator.userAgent
                    })
                });
                
                if (response.ok) {
                    showStatus('Notifications enabled successfully! ✓');
                    
                    // Send a test notification
                    try {
                        await fetch('/api/send-test-notification/', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': getCookie('csrftoken')
                            },
                            body: JSON.stringify({
                                title: 'Welcome to RoBosForx! 🎉',
                                message: 'You will now receive important updates about your account',
                                url: '/'  // Root URL
                            })
                        });
                    } catch(e) {
                        console.log('Test notification error:', e);
                    }
                    return true;
                } else {
                    console.error('Failed to save subscription');
                    showStatus('Failed to enable notifications', true);
                    return false;
                }
            } catch (error) {
                console.error('Subscription failed:', error);
                showStatus('Failed to enable notifications: ' + error.message, true);
                return false;
            }
        }
        
        // Unsubscribe from push notifications
        async function unsubscribeFromPush() {
            try {
                const registration = await navigator.serviceWorker.ready;
                const subscription = await registration.pushManager.getSubscription();
                
                if (subscription) {
                    // Send unsubscribe request to server
                    await fetch('/webpush/save_information', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify({
                            status_type: 'unsubscribe',
                            subscription: subscription.toJSON(),
                            browser: navigator.userAgent,
                            user_agent: navigator.userAgent
                        })
                    });
                    
                    await subscription.unsubscribe();
                    console.log('Unsubscribed successfully');
                    showStatus('Notifications disabled');
                    return true;
                }
                return true;
            } catch (error) {
                console.error('Unsubscription failed:', error);
                showStatus('Failed to disable notifications', true);
                return false;
            }
        }
        
        // Handle toggle change
        toggle.addEventListener('change', async function(e) {
            setLoading(true);
            
            if (this.checked) {
                // Enable notifications
                const success = await subscribeToPush();
                if (!success) {
                    toggle.checked = false;
                }
            } else {
                // Disable notifications
                const success = await unsubscribeFromPush();
                if (!success) {
                    toggle.checked = true;
                }
            }
            
            setLoading(false);
        });
        
        // Check subscription status on page load
        document.addEventListener('DOMContentLoaded', checkSubscription);
    }
</script>
{% endif %}
